<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <h1>Good Morning!</h1>
    <p>Your Daily Productivity Hub</p>
</header>

<section id="planner-tools">
    <div class="container px-4 py-5" id="featured-3">
    <h2 class="pb-2 border-bottom">My Daily Tools</h2>
    <div class="row g-4 py-5 row-cols-1 row-cols-lg-2">
      
      <div class="feature col">
        <div class="feature-icon d-inline-flex align-items-center justify-content-center fs-2 mb-3">
          ✅
        </div>
        <h3 class="fs-2 text-body-emphasis">Daily Tasks</h3>
        <p>Manage your to-do list, set priorities, and get things done.</p>
        <a href="todo-app/todo.html" class="btn btn-primary">
          Open Planner
        </a>
      </div>

      <div class="feature col">
        <div class="feature-icon d-inline-flex align-items-center justify-content-center fs-2 mb-3">
          ☀️
        </div>
        <h3 class="fs-2 text-body-emphasis">Weather Forecast</h3>
        <p>Check the temperature and conditions before you head out.</p>
        <a href="weather-app/weather.html" class="btn btn-primary">
          Check Weather
        </a>
      </div>

    </div>
</div>
</section>
</body>
</html>
